version: '3.9'

services:
  nestwise-frontend:
    build: ./frontend
    container_name: nestwise-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: ./.env
    command: sh -c "npm install && npm run build && npm start"
  
  nestwise-backend:
    build: ./backend
    container_name: nestwise-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    volumes:
      - ./backend:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload