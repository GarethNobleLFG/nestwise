version: '3.9'
name: nestwise
services:
  nestwise-frontend:
    build: ./frontend
    container_name: nestwise-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: ./.env
    command: npm start
  
  nestwise-backend:
    build: ./backend
    container_name: nestwise-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    volumes:
      - ./backend:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mongo
  
  mongo:
    image: mongo:6.0
    container_name: nestwise-mongo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"

networks:
  default:
    driver: bridge